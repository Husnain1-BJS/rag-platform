version: "3.9"

services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 10s
      retries: 5

  api:
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ../../.env
    environment:
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - QDRANT_PATH=
    depends_on:
      qdrant:
        condition: service_healthy
    volumes:
      - hf_cache:/root/.cache/huggingface
    restart: unless-stopped

  frontend:
    build:
      context: ../..
      dockerfile: apps/frontend/Dockerfile
    ports:
      - "8501:8501"
    env_file:
      - ../../.env
    environment:
      - API_URL=http://api:8000/query
    depends_on:
      - api
    restart: unless-stopped

volumes:
  qdrant_storage:
  hf_cache: